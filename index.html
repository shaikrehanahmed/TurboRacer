<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Racer: Ultimate Edition</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; background: #111; }

        /* --- BIOMES (APPLIED TO BODY BACKGROUND) --- */
        body.forest { background-color: #228B22; background-image: radial-gradient(#1a6b1a 15%, transparent 16%); background-size: 60px 60px; }
        body.desert { background-color: #EDC9AF; background-image: linear-gradient(45deg, #e4bc96 25%, transparent 25%, transparent 75%, #e4bc96 75%, #e4bc96); background-size: 40px 40px; }
        body.snow { background-color: #F0F8FF; background-image: radial-gradient(circle, #dbe9f4 10%, transparent 10%); background-size: 50px 50px; }
        body.nightmare { background-color: #000; }

        /* --- SCREENS --- */
        .screen {
            position: absolute; width: 100%; height: 100vh; top: 0; left: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }

        /* Login */
        #loginPage { 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; width: 320px; color: white; }
        .glass-box h2 { margin-top: 0; font-size: 28px; letter-spacing: 2px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .glass-box input { background: rgba(255, 255, 255, 0.9); border: none; outline: none; padding: 12px; width: calc(100% - 24px); margin-bottom: 15px; border-radius: 8px; font-weight: bold; color: #333; transition: box-shadow 0.3s; }
        .glass-box input:focus { box-shadow: 0 0 15px #28a745; }
        .auth-tabs { display: flex; margin-bottom: 25px; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        .auth-tabs button { flex: 1; margin: 0; border-radius: 0; background: rgba(0,0,0,0.4); color: #ccc; border: none; padding: 12px;}
        .auth-tabs button.active { background: #28a745; color: white; font-weight: bold; }
        .error-msg { color: #ff4d4d; font-size: 14px; margin-bottom: 15px; min-height: 20px; font-weight: bold; text-shadow: 0 1px 2px #000;}
        .success-msg { color: #00ff00; }
        button.action-btn { width: 100%; padding: 12px; border-radius: 8px; background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 18px; transition: transform 0.1s, background 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        button.action-btn:hover { background: #218838; transform: scale(1.02); }

        /* Menus */
        #menuPage { display: none; background: rgba(0,0,0,0.9); color: white; }
        .menu-btn { padding: 15px 30px; font-size: 18px; margin: 10px; width: 250px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; transition: transform 0.1s;}
        .menu-btn:hover { transform: scale(1.05); }
        #gameOverPage { display: none; background: rgba(50, 0, 0, 0.95); color: white; border: 5px solid red; }
        .stat-box { font-size: 24px; margin: 10px; color: gold; }

        /* Garage */
        #garagePage { display: none; background: #222; color: white; z-index: 1001; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px;}
        .shop-item { border: 2px solid #555; padding: 20px; border-radius: 10px; background: #333; cursor: pointer; position: relative; text-align: center;}
        .shop-item:hover { border-color: gold; }
        .shop-item.owned { border-color: #28a745; }
        .shop-item.equipped { border-color: cyan; box-shadow: 0 0 15px cyan; }
        .price-tag { color: gold; font-weight: bold; }
        .owned-tag { color: #28a745; font-weight: bold; display: none; }
        .shop-item.owned .price-tag { display: none; }
        .shop-item.owned .owned-tag { display: block; }

        /* --- GAME AREA (REALISTIC ASPHALT ROAD) --- */
        #gameWrapper { display: none; width: 100%; height: 100vh; }
        
        #gameArea {
            width: 400px; height: 100vh; margin: auto; position: relative;
            background-color: #2c2c2c; 
            /* Realistic SVG Noise Texture for Asphalt */
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
            border-left: 10px solid #ddd; border-right: 10px solid #ddd;
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #darknessOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 900; }

        /* --- HUD --- */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 950; color: white; font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; border: 1px solid white; }
        #energyBarContainer { width: 100px; height: 10px; background: #333; margin-top: 5px; border: 1px solid white; }
        #energyBar { width: 100%; height: 100%; background: orange; transition: width 0.1s; }
        #cooldownText { color: red; font-size: 12px; display: none; animation: flash 1s infinite; }
        @keyframes flash { 0% {opacity:1;} 50% {opacity:0;} 100% {opacity:1;} }

        /* --- REALISTIC CARS & OBJECTS (PURE CSS) --- */
        #playerCar {
            width: 50px; height: 95px; position: absolute; bottom: 100px; left: 175px; z-index: 10;
            background-color: #d32f2f;
            background-image: 
                linear-gradient(to bottom, transparent 25px, #111 25px, #111 45px, transparent 45px, transparent 65px, #111 65px, #111 85px, transparent 85px),
                linear-gradient(to right, #b71c1c 4px, transparent 4px, transparent 46px, #b71c1c 46px);
            border-radius: 15px 15px 10px 10px;
            box-shadow: 0 15px 15px rgba(0,0,0,0.6), inset 0 0 10px rgba(0,0,0,0.4);
        }
        
        /* Windshield and Roof */
        #playerCar::before {
            content: ''; position: absolute; top: 25px; left: 5px; width: 40px; height: 20px;
            background: linear-gradient(to bottom, #000, #333); border-radius: 4px 4px 0 0; border-top: 2px solid rgba(255,255,255,0.3);
        }

        /* Rear Window and Spoiler */
        #playerCar::after {
            content: ''; position: absolute; bottom: 10px; left: 5px; width: 40px; height: 15px;
            background: #111; border-radius: 0 0 4px 4px; box-shadow: 0 8px 0 -4px #b71c1c; 
        }

        /* Front Headlight Beams */
        .headlights {
            position: absolute; top: 2px; left: 4px; width: 10px; height: 4px; background: #fff; border-radius: 5px;
            box-shadow: 32px 0 0 #fff, 0 -15px 30px 15px rgba(255, 255, 200, 0.6), 32px -15px 30px 15px rgba(255, 255, 200, 0.6);
        }

        .enemy { position: absolute; z-index: 5; }

        /* Realistic Enemy Traffic Car */
        .bot-car { 
            width: 50px; height: 95px; background-color: #1976d2;
            background-image: 
                linear-gradient(to bottom, transparent 25px, #111 25px, #111 45px, transparent 45px, transparent 65px, #111 65px, #111 85px, transparent 85px),
                linear-gradient(to right, #0d47a1 4px, transparent 4px, transparent 46px, #0d47a1 46px);
            border-radius: 10px 10px 15px 15px; /* Boxier rear */
            box-shadow: 0 10px 15px rgba(0,0,0,0.6), inset 0 0 10px rgba(0,0,0,0.4);
        }
        
        /* Enemy Windshield (Facing Down) */
        .bot-car::before {
            content: ''; position: absolute; bottom: 25px; left: 5px; width: 40px; height: 20px;
            background: linear-gradient(to top, #000, #333); border-radius: 0 0 4px 4px; border-bottom: 2px solid rgba(255,255,255,0.3);
        }
        
        /* Enemy Headlight Beams */
        .bot-car::after {
            content: ''; position: absolute; bottom: 2px; left: 4px; width: 10px; height: 4px; background: #fff; border-radius: 5px;
            box-shadow: 32px 0 0 #fff, 0 15px 20px 10px rgba(255, 255, 200, 0.4), 32px 15px 20px 10px rgba(255, 255, 200, 0.4);
        }

        /* Realistic Rock (Obstacle) */
        .wooden-box { 
            width: 45px; height: 40px; background-color: #757575;
            background-image: radial-gradient(circle at 30% 30%, #9e9e9e, #616161 60%, #424242);
            border-radius: 40% 60% 50% 40% / 50% 40% 60% 50%; /* Organic shape */
            border: none;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.6), 5px 10px 15px rgba(0,0,0,0.5);
        }
        
        /* Yellow Dashed Road Lines */
        .line { width: 6px; height: 80px; background: #ffcc00; position: absolute; left: 197px; box-shadow: 0 0 5px rgba(0,0,0,0.5); }

        /* Weapons & Effects */
        .bullet { position: absolute; z-index: 8; border-radius: 50%; }
        .bullet-blaster { width: 6px; height: 15px; background: yellow; box-shadow: 0 0 5px orange; }
        .bullet-laser { width: 4px; height: 30px; background: cyan; box-shadow: 0 0 10px blue; }
        .bullet-plasma { width: 20px; height: 20px; background: lime; border-radius: 50%; box-shadow: 0 0 10px green; }

        .explosion { width: 50px; height: 50px; position: absolute; z-index: 20; background: orange; border-radius: 50%; animation: explode 0.5s forwards; }
        @keyframes explode { 0% {transform:scale(0.5); opacity:1;} 100% {transform:scale(2); opacity:0;} }
        
        .coin { width: 30px; height: 30px; background: gold; border-radius: 50%; position: absolute; z-index: 4; text-align: center; line-height: 30px; font-weight: bold; color: brown; box-shadow: 0 5px 10px rgba(0,0,0,0.5);}
        .coin::after { content: '$'; }
    </style>
</head>
<body class="forest"> 
    
    <div id="loginPage" class="screen">
        <div class="glass-box">
            <h2>TURBO RACER</h2>
            <div class="auth-tabs">
                <button id="tabLogin" class="active" onclick="switchTab('login')">Login</button>
                <button id="tabRegister" onclick="switchTab('register')">Create Account</button>
            </div>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <div id="authError" class="error-msg"></div>
            <button id="authBtn" class="action-btn" onclick="handleAuth()">LOGIN</button>
        </div>
    </div>

    <div id="menuPage" class="screen">
        <h1>MAIN MENU</h1>
        <h3 style="color: gold;">COINS: <span id="menuCoins">0</span></h3>
        <p style="color: cyan; margin-top: -10px;">Welcome, <span id="displayUser">Player</span>!</p>
        
        <p>Select Biome:</p>
        <div style="display:flex; gap:10px; margin-bottom: 20px;">
            <button class="menu-btn" onclick="selectBiome('forest')" style="background:#228B22; width: auto; padding: 10px 20px;">Forest</button>
            <button class="menu-btn" onclick="selectBiome('desert')" style="background:#EDC9AF; color:black; width: auto; padding: 10px 20px;">Desert</button>
            <button class="menu-btn" onclick="selectBiome('snow')" style="background:#F0F8FF; color:black; width: auto; padding: 10px 20px;">Snow</button>
            <button class="menu-btn" onclick="selectBiome('nightmare')" style="background:#000; border:2px solid red; color:red; width: auto; padding: 10px 20px;">NIGHTMARE</button>
        </div>

        <button class="menu-btn" style="background:#28a745;" onclick="startGame()">RACE NOW</button>
        <button class="menu-btn" onclick="openGarage()" style="background:#555;">GARAGE</button>
        <button class="menu-btn" onclick="logout()" style="background:#8b0000; font-size: 14px; padding: 10px;">LOGOUT</button>
    </div>

    <div id="garagePage" class="screen">
        <h1>WEAPON SHOP</h1>
        <h3 style="color: gold;">Your Coins: <span id="shopCoins">0</span></h3>
        <div class="shop-grid">
            <div class="shop-item" id="item-blaster" onclick="equipItem('blaster', 0)">
                <h3>Blaster</h3><p>Standard</p><div class="owned-tag">OWNED</div>
            </div>
            <div class="shop-item" id="item-laser" onclick="buyItem('laser', 500)">
                <h3>Laser</h3><p>Fast Fire</p><span class="price-tag">500 Coins</span><div class="owned-tag">OWNED</div>
            </div>
            <div class="shop-item" id="item-plasma" onclick="buyItem('plasma', 1000)">
                <h3>Plasma</h3><p>Big Damage</p><span class="price-tag">1000 Coins</span><div class="owned-tag">OWNED</div>
            </div>
        </div>
        <button class="menu-btn" onclick="closeGarage()" style="background:#555; margin-top:30px;">BACK TO MENU</button>
    </div>

    <div id="gameOverPage" class="screen">
        <h1 style="color:red; font-size: 50px; margin:0;">CRASHED!</h1>
        <div class="stat-box">Score: <span id="finalScore">0</span></div>
        <div class="stat-box">Coins Earned: <span id="finalCoins">0</span></div>
        <div class="stat-box" style="font-size: 18px; color: #fff;">High Score: <span id="highScoreVal">0</span></div>
        <br>
        <button class="menu-btn" style="background:#28a745;" onclick="retryGame()">TRY AGAIN</button>
        <button class="menu-btn" onclick="goToMenu()" style="background:#555">MAIN MENU</button>
    </div>

    <div id="gameWrapper">
        <div id="darknessOverlay"></div> 
        <div id="hud">
            Score: <span id="scoreVal">0</span><br>
            Coins: <span id="coinVal">0</span><br>
            <div style="margin-top:10px; font-size:12px; color:orange;">WEAPON ENERGY</div>
            <div id="energyBarContainer"><div id="energyBar"></div></div>
            <div id="cooldownText">RECHARGING...</div>
        </div>
        <div id="gameArea"></div>
    </div>

    <script>
        let usersDB = JSON.parse(localStorage.getItem('tr_usersDB')) || {};
        let currentUser = null;
        let authMode = 'login'; 

        let coins = 0; let inventory = ['blaster']; let equippedWeapon = 'blaster'; let highScore = 0; let audioCtx; 

        function switchTab(mode) {
            authMode = mode;
            document.getElementById('authError').innerText = '';
            document.getElementById('authError').className = 'error-msg'; 
            if (mode === 'login') {
                document.getElementById('tabLogin').className = 'active';
                document.getElementById('tabRegister').className = '';
                document.getElementById('authBtn').innerText = 'LOGIN';
                document.getElementById('authBtn').style.background = '#28a745';
            } else {
                document.getElementById('tabLogin').className = '';
                document.getElementById('tabRegister').className = 'active';
                document.getElementById('authBtn').innerText = 'CREATE ACCOUNT';
                document.getElementById('authBtn').style.background = '#007bff';
            }
        }

        function handleAuth() {
            const userBox = document.getElementById('username');
            const passBox = document.getElementById('password');
            const u = userBox.value.trim(); const p = passBox.value.trim();
            const errorDiv = document.getElementById('authError');

            if (u === "" || p === "") { errorDiv.innerText = "Please enter Username and Password."; errorDiv.className = 'error-msg'; return; }

            if (authMode === 'register') {
                if (usersDB[u]) {
                    errorDiv.innerText = "Username already taken!"; errorDiv.className = 'error-msg';
                } else {
                    usersDB[u] = { password: p, coins: 0, inventory: ['blaster'], equippedWeapon: 'blaster', highScore: 0 };
                    localStorage.setItem('tr_usersDB', JSON.stringify(usersDB));
                    errorDiv.innerText = "Account created! You can now Login."; errorDiv.className = 'error-msg success-msg';
                    userBox.value = ''; passBox.value = ''; switchTab('login');
                }
            } else if (authMode === 'login') {
                if (!usersDB[u]) { errorDiv.innerText = "User not found. Please register."; errorDiv.className = 'error-msg';
                } else if (usersDB[u].password !== p) { errorDiv.innerText = "Incorrect password."; errorDiv.className = 'error-msg';
                } else {
                    currentUser = u; loadUserData();
                    document.getElementById('displayUser').innerText = currentUser;
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('menuPage').style.display = 'flex';
                    userBox.value = ''; passBox.value = ''; 
                }
            }
        }

        function logout() { currentUser = null; document.getElementById('menuPage').style.display = 'none'; document.getElementById('loginPage').style.display = 'flex'; document.getElementById('authError').innerText = ''; }
        function loadUserData() { if(!currentUser) return; let data = usersDB[currentUser]; coins = data.coins || 0; inventory = data.inventory || ['blaster']; equippedWeapon = data.equippedWeapon || 'blaster'; highScore = data.highScore || 0; updateMenuUI(); }
        function saveData() { if(!currentUser) return; usersDB[currentUser].coins = coins; usersDB[currentUser].inventory = inventory; usersDB[currentUser].equippedWeapon = equippedWeapon; usersDB[currentUser].highScore = highScore; localStorage.setItem('tr_usersDB', JSON.stringify(usersDB)); }
        function updateMenuUI() { document.getElementById('menuCoins').innerText = coins; document.getElementById('shopCoins').innerText = coins; ['blaster', 'laser', 'plasma'].forEach(item => { let el = document.getElementById('item-' + item); if(el) { el.classList.remove('owned', 'equipped'); if(inventory.includes(item)) el.classList.add('owned'); if(equippedWeapon === item) el.classList.add('equipped'); } }); }
        function openGarage() { document.getElementById('menuPage').style.display = 'none'; document.getElementById('garagePage').style.display = 'flex'; updateMenuUI(); }
        function closeGarage() { document.getElementById('garagePage').style.display = 'none'; document.getElementById('menuPage').style.display = 'flex'; }
        function buyItem(item, price) { if(inventory.includes(item)) { equipItem(item); return; } if(coins >= price) { coins -= price; inventory.push(item); saveData(); equipItem(item); } else { alert("Need " + price + " coins!"); } }
        function equipItem(item) { if(!inventory.includes(item)) return; equippedWeapon = item; saveData(); updateMenuUI(); }

        let selectedBiome = 'forest';
        function selectBiome(b) { selectedBiome = b; document.body.className = b; }

        const gameArea = document.getElementById('gameArea'); const overlay = document.getElementById('darknessOverlay'); const energyBar = document.getElementById('energyBar'); const cooldownText = document.getElementById('cooldownText');
        let player = { x: 0, speed: 6, score: 0 }; let weapon = { energy: 100, overheated: false }; let keys = { left:false, right:false }; let isActive = false; let sessionCoins = 0; 

        document.addEventListener('keydown', e => { if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true; if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true; if(e.key === ' ') shoot(); });
        document.addEventListener('keyup', e => { if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false; if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false; });

        function startGame() {
            document.getElementById('menuPage').style.display = 'none'; document.getElementById('gameOverPage').style.display = 'none'; document.getElementById('gameWrapper').style.display = 'block';
            document.body.className = selectedBiome; 
            overlay.style.display = (selectedBiome === 'nightmare') ? 'block' : 'none';

            gameArea.innerHTML = ""; player.score = 0; player.speed = 6; sessionCoins = 0; weapon.energy = 100; weapon.overheated = false; updateEnergyUI(); isActive = true;

            let car = document.createElement('div'); car.id = 'playerCar'; 
            car.innerHTML = '<div class="headlights"></div>'; /* Added realistic headlights */
            gameArea.appendChild(car); player.x = car.offsetLeft;

            for(let i=0; i<5; i++) createLine(i*150);
            for(let i=0; i<3; i++) createObject('enemy', -300*i);
            createObject('coin', -600);

            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            window.requestAnimationFrame(gameLoop);
        }

        function createLine(y) { let l = document.createElement('div'); l.className='line'; l.y=y; l.style.top=y+'px'; gameArea.appendChild(l); }
        function shoot() {
            if(!isActive || weapon.overheated) return;
            weapon.energy -= 10; if(weapon.energy <= 0) { weapon.energy = 0; startCooldown(); }
            updateEnergyUI(); playSound('shoot');
            let b = document.createElement('div'); b.classList.add('bullet', 'bullet-' + equippedWeapon);
            b.style.left = (player.x + 20) + 'px'; b.style.bottom = '180px'; b.y = 180; gameArea.appendChild(b);
        }

        function startCooldown() {
            weapon.overheated = true; cooldownText.style.display = 'block'; energyBar.style.background = 'red';
            let timeLeft = 10;
            let timer = setInterval(() => {
                timeLeft--; weapon.energy += 10; energyBar.style.width = weapon.energy + "%";
                if(timeLeft <= 0) { clearInterval(timer); weapon.overheated = false; weapon.energy = 100; cooldownText.style.display = 'none'; energyBar.style.background = 'orange'; updateEnergyUI(); }
            }, 1000);
        }

        function updateEnergyUI() { energyBar.style.width = weapon.energy + "%"; }

        function gameLoop() {
            if(!isActive) return;
            let car = document.getElementById('playerCar'); let road = gameArea.getBoundingClientRect();

            if(keys.left && player.x > 5) player.x -= player.speed;
            if(keys.right && player.x < road.width - 55) player.x += player.speed;
            car.style.left = player.x + "px";

            if(selectedBiome === 'nightmare') {
                let carRect = car.getBoundingClientRect(); let centerX = carRect.left + (carRect.width / 2); let centerY = carRect.top + (carRect.height / 2);
                overlay.style.background = `radial-gradient(circle 200px at ${centerX}px ${centerY}px, transparent 0%, rgba(0,0,0,0.98) 100%)`;
            }

            document.querySelectorAll('.line').forEach(l => {
                l.y += player.speed; if(l.y > window.innerHeight) l.y = -100; l.style.top = l.y + 'px';
            });

            document.querySelectorAll('.bullet').forEach(b => {
                b.y += 15; b.style.bottom = b.y + 'px';
                if(b.y > window.innerHeight) b.remove();
                let bRect = b.getBoundingClientRect();
                document.querySelectorAll('.enemy').forEach(e => {
                    if(isCollide(bRect, e.getBoundingClientRect())) {
                        createExplosion(e.offsetLeft, e.offsetTop); e.y = -500; e.style.left = Math.random()*350+'px'; b.remove(); player.score += 200; playSound('boom');
                    }
                });
            });

            document.querySelectorAll('.enemy, .coin').forEach(obj => {
                obj.y += player.speed;
                if(obj.y > window.innerHeight) { obj.y = -500; obj.style.left = Math.floor(Math.random() * 350) + 'px'; }
                obj.style.top = obj.y + 'px';
                if(isCollide(car.getBoundingClientRect(), obj.getBoundingClientRect())) {
                    if(obj.classList.contains('coin')) { coins += 10; sessionCoins += 10; obj.y = -1000; playSound('coin');
                    } else { gameOver(); }
                }
            });

            player.score++; document.getElementById('scoreVal').innerText = player.score; document.getElementById('coinVal').innerText = coins;
            if(player.score % 1000 === 0) player.speed += 0.5;
            window.requestAnimationFrame(gameLoop);
        }

        function createObject(type, y) {
            let e = document.createElement('div'); e.className = type;
            if(type === 'enemy') e.classList.add(Math.random()>0.5 ? 'bot-car' : 'wooden-box');
            e.y = y; e.style.top = y+'px'; e.style.left = Math.random()*350+'px'; gameArea.appendChild(e);
        }

        function createExplosion(x, y) { let ex = document.createElement('div'); ex.className='explosion'; ex.style.left=x+'px'; ex.style.top=y+'px'; gameArea.appendChild(ex); setTimeout(()=>ex.remove(), 500); }
        function isCollide(a, b) { return !(a.bottom < b.top || a.top > b.bottom || a.right < b.left || a.left > b.right); }

        function gameOver() {
            isActive = false; playSound('boom');
            if (player.score > highScore) { highScore = player.score; }
            saveData(); 
            document.getElementById('finalScore').innerText = player.score; document.getElementById('finalCoins').innerText = sessionCoins; document.getElementById('highScoreVal').innerText = highScore;
            document.getElementById('gameWrapper').style.display = 'none'; document.getElementById('gameOverPage').style.display = 'flex';
        }

        function retryGame() { startGame(); }
        function goToMenu() { document.getElementById('gameOverPage').style.display = 'none'; document.getElementById('menuPage').style.display = 'flex'; updateMenuUI(); }

        function playSound(t) {
            if(!audioCtx) return; let o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
            if(t==='shoot') { o.type='square'; o.frequency.setValueAtTime(400, audioCtx.currentTime); o.frequency.linearRampToValueAtTime(100, audioCtx.currentTime+0.1); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1); }
            if(t==='coin') { o.type='sine'; o.frequency.setValueAtTime(1000, audioCtx.currentTime); o.frequency.linearRampToValueAtTime(2000, audioCtx.currentTime+0.1); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1); }
            if(t==='boom') { o.type='sawtooth'; o.frequency.setValueAtTime(100, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.3); o.start(); o.stop(audioCtx.currentTime+0.3); }
        }
    </script>
</body>
</html>
